<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTravel Admin | Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light-gray">

    <div class="d-flex h-100 vh-100">
        <!-- Sidebar -->
        <aside class="sidebar bg-white border-end border-light-subtle d-flex flex-column" style="width: 260px;">
            <div class="p-4 border-bottom border-light-subtle">
                <a class="d-flex align-items-center fw-bold text-dark fs-5 text-decoration-none" href="#">
                    <div class="logo-icon bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
                        <i class="bi bi-geo-alt-fill lh-1"></i>
                    </div>
                    Nexus<span class="text-primary">Admin</span>
                </a>
            </div>

            <div class="sidebar-menu px-3 py-4 flex-grow-1">
                <a href="#" class="nav-link active menu-switcher mb-2" data-target="dashboard-section"><i class="bi bi-house-door me-2"></i> Dashboard</a>
                <a href="#" class="nav-link menu-switcher" data-target="requests-section"><i class="bi bi-building-add me-2"></i> Business Requests</a>
            </div>
            
            <div class="p-3 border-top border-light-subtle">
                <a href="#" class="nav-link text-danger"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow-1 overflow-auto bg-light-gray">
            <header class="bg-white border-bottom border-light-subtle py-3 px-4 shadow-sm">
                <h5 class="fw-bold mb-0 text-dark">Admin Panel</h5>
            </header>

            <div class="p-4 p-md-5">
                <!-- Dashboard Section -->
                <section id="dashboard-section" class="admin-section active">
                    <h3 class="fw-bold text-dark mb-4">Dashboard Overview</h3>
                    <div class="row g-4">
                        <div class="col-md-6 col-xl-3"><div class="card p-4 rounded-custom border-0 shadow-sm"><p class="text-muted small mb-1">Total Users</p><h2 class="fw-bold mb-0">12,450</h2></div></div>
                        <div class="col-md-6 col-xl-3"><div class="card p-4 rounded-custom border-0 shadow-sm"><p class="text-muted small mb-1">Total Businesses</p><h2 class="fw-bold mb-0">842</h2></div></div>
                        <div class="col-md-6 col-xl-3"><div class="card p-4 rounded-custom border-0 shadow-sm"><p class="text-muted small mb-1">Total Bookings</p><h2 class="fw-bold mb-0">34.2K</h2></div></div>
                        <div class="col-md-6 col-xl-3"><div class="card p-4 rounded-custom border-0 shadow-sm"><p class="text-muted small mb-1">Pending Requests</p><h2 class="fw-bold text-primary mb-0">15</h2></div></div>
                    </div>
                </section>

                <!-- Requests Section -->
                <section id="requests-section" class="admin-section">
                    <h3 class="fw-bold text-dark mb-4">Business Requests</h3>
                    <div class="card bg-white border-light-subtle rounded-custom shadow-sm overflow-hidden">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light-gray text-muted small">
                                <tr><th class="ps-4 py-3 border-0">Business</th><th class="py-3 border-0">Category</th><th class="py-3 border-0 text-center">Docs</th><th class="pe-4 py-3 border-0 text-end">Action</th></tr>
                            </thead>
                            <tbody id="requestsBody">
                                <tr class="request-row">
                                    <td class="ps-4 fw-bold text-dark">L'Arpège<br><small class="text-muted fw-normal">Alain Passard</small></td>
                                    <td><span class="badge bg-light text-dark border rounded-pill">Restaurant</span></td>
                                    <td class="text-center"><button class="btn btn-sm btn-light text-primary"><i class="bi bi-file-earmark-pdf"></i> View</button></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-success btn-sm rounded-pill px-3 fw-bold accept-btn me-2">Accept</button>
                                        <button class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold reject-btn">Reject</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
<style>
    :root {
    --primary: #2563EB;
    --dark: #0F172A;
    --light-gray: #F8FAFC;
}

body { font-family: 'Inter', sans-serif; background-color: var(--light-gray); }
.rounded-custom { border-radius: 16px !important; }
.sidebar { width: 260px; }
.nav-link { color: #64748B; padding: 12px 20px; border-radius: 10px; margin: 5px 15px; text-decoration: none; display: flex; align-items: center;}
.nav-link.active { background-color: var(--primary); color: white; }
.admin-section { display: none; }
.admin-section.active { display: block; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    // 1. SPA Navigation
    const navLinks = document.querySelectorAll('.menu-switcher');
    const sections = document.querySelectorAll('.admin-section');

    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            navLinks.forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            sections.forEach(s => s.classList.remove('active'));
            document.getElementById(link.getAttribute('data-target')).classList.add('active');
        });
    });

    // 2. Accept/Reject Workflow
    const requestsBody = document.getElementById('requestsBody');
    requestsBody.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const row = btn.closest('.request-row');
        
        if (btn.classList.contains('accept-btn')) {
            btn.innerHTML = `Approved`;
            btn.className = 'btn btn-outline-success btn-sm rounded-pill px-3';
            row.querySelectorAll('button').forEach(b => b.disabled = true);
        } else if (btn.classList.contains('reject-btn')) {
            if(confirm("Reject this request?")) row.remove();
        }
    });
});
</script>
